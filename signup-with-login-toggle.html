<!DOCTYPE html>
<html>
<head>
    <title>Signup Success Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
    <h2>Signup</h2>

    <form id="signupForm">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>

        <button type="submit" id="signupBtn">Signup</button>
    </form>

    <!-- Success Message -->
    <p id="successMessage" style="display:none; color:green;">
        Signup Successful!
    </p>

    <!-- Login Button (Hidden Initially) -->
    <button id="loginBtn" style="display:none;" onclick="goToLogin()">
        Go to Login
    </button>

</div>
</body>
</html>
